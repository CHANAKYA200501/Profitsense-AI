version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: profitsense_db
    environment:
      POSTGRES_USER: etmind
      POSTGRES_PASSWORD: etmindpassword
      POSTGRES_DB: etmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: profitsense_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: profitsense_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  qdrantdata:
